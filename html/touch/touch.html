<!doctype html>
<html>
<head>
  <title>device test</title>
  <meta charset='utf-8'>
  <link rel="stylesheet" href="touch.css" type="text/css" media="all">
  <!-- ROS -->
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  <script src='../ros/rosmain.js'> </script>
  <!-- -->
  <script src="touch.js?version=0001"></script>
</head>
<!-- https://developer.mozilla.org/ja/docs/Web/API/Touch_events -->
<body>
  <canvas id="canvas" width="600" height="600" style="border:solid black 1px;">
    このブラウザーは canvas 要素に対応していません。
  </canvas>
  <br />
  <div id="header-contents"> </div>
  <br />
  <div>
    <label>ペンの太さ: </label>
    <input type="range" id="brushSize" min="1" max="20" value="4">
    <span id="brushSizeDisplay">4</span>px
    <label style="margin-left:12px;">色: </label>
    <input type="color" id="penColor" value="#000000">
    <button type="button" id="buttonEraser">消しゴム</button>
    <button type="button" id="buttonUndo">戻る</button>
    <button type="button" id="buttonRedo">進む</button>
  </div>
  <div>
    <button type="button" id="buttonSend">Send</button>
    <button type="button" id="buttonClear">Clear</button>
  </div>
  <br />
  <div id="sbir-panel">
    <h3>SBIR Top5</h3>
    <div id="sbir-status">まだ結果はありません</div>
    <div id="sbir-query"></div>
    <div id="sbir-results"></div>
    <div id="vlm-decision-panel"></div>
  </div>
  <br />
  <!-- No Log
  Log:
  <pre id="log" style="border: 1px solid #ccc;"></pre>
  -->
  <script>
      let vlmFeedbackTopic = null;
      let lastSbirPayload = null;

      const ros = ros_start();
      if (ros) {
          var rostopic = new ROSLIB.Topic({
              ros : ros,
              name : '/writing',
              messageType : 'std_msgs/String'
          });

          var resultTopic = new ROSLIB.Topic({
            ros : ros,
            name : '/sbir_top5',
            messageType : 'std_msgs/String'
          });

          vlmFeedbackTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/vlm_user_feedback',
            messageType: 'std_msgs/String'
          });

          resultTopic.subscribe(function(message) {
            try {
              const payload = JSON.parse(message.data);
              renderSbirResult(payload);
            } catch (e) {
              console.log('failed to parse /sbir_top5:', e);
            }
          });
      }

        function renderSbirResult(payload) {
          lastSbirPayload = payload;

          const statusEl = document.getElementById('sbir-status');
          const queryEl = document.getElementById('sbir-query');
          const resultsEl = document.getElementById('sbir-results');
          const vlmEl = document.getElementById('vlm-decision-panel');

          if (!statusEl || !queryEl || !resultsEl) return;

          const sketchName = payload.sketch_file || '(unknown sketch)';
          statusEl.textContent = `結果を受信しました: ${sketchName}`;

          const sketchWeb = payload.sketch_web_path;
          queryEl.innerHTML = sketchWeb
          ? `<div class="query-wrap"><b>query:</b><br><img class="sbir-query-img" src="${sketchWeb}" alt="query sketch"></div>`
          : '';

          const topk = Array.isArray(payload.topk) ? payload.topk : [];
          if (topk.length === 0) {
            resultsEl.innerHTML = '<p>結果がありません。</p>';
            return;
          }

          resultsEl.innerHTML = topk.map(item => {
            const rank = item.rank ?? '-';
            const score = typeof item.score === 'number' ? item.score.toFixed(4) : item.score;
            const name = item.photo_file || item.gallery_file || '(no-name)';
            const img = item.photo_web_path || '';
            const imgHtml = img
            ? `<img class="sbir-photo-img" src="${img}" alt="rank ${rank}: ${name}">`
            : '<div class="sbir-photo-missing">画像なし</div>';
            return `
            <div class="sbir-card" data-rank="${rank}" id="sbir-card-${rank}">
              <div class="sbir-rank">#${rank}</div>
              ${imgHtml}
              <div class="sbir-meta">${name}</div>
              <div class="sbir-meta">score: ${score}</div>
            </div>
            `;
          }).join('');

          // Render VLM decision if available
          if (payload.vlm_decision && vlmEl) {
            renderVlmDecision(payload.vlm_decision, vlmEl);
          } else if (vlmEl) {
            vlmEl.innerHTML = '';
          }
        }

        function renderVlmDecision(decision, container) {
          if (!decision) return;

          const actionType = decision.action_type || 'unknown';
          const questionMode = decision.question_mode || null;
          const reasoning = decision.reasoning || '';
          const extractedFeatures = decision.extracted_features || '';
          const selectedId = decision.selected_id;
          const question = decision.robot_question || '';
          const remainingCandidates = Array.isArray(decision.remaining_candidates)
            ? decision.remaining_candidates
            : [];
          const binaryMapping = decision.binary_mapping || null;

          clearCandidateHighlights();

          let html = '<div style="margin-top: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background-color: #f9f9f9;">';
          html += '<h4 style="margin-top: 0; color: #333;">🤖 VLM逆質問分析</h4>';

          if (extractedFeatures) {
            html += `<p><b>抽出された特徴:</b> ${escapeHtml(extractedFeatures)}</p>`;
          }

          if (actionType === 'execute' && selectedId !== undefined && selectedId !== null) {
            highlightCandidateCard(selectedId);
            html += `<div style="background-color: #d4edda; padding: 8px; border-radius: 4px; margin: 8px 0;">
              <p style="margin: 0; color: #155724;"><b>✓ 決定:</b> 候補#${selectedId}を推奨</p>
              <p style="margin: 5px 0 0 0; color: #155724; font-size: 12px;">${escapeHtml(reasoning)}</p>
            </div>`;
          } else if (actionType === 'resketch') {
            html += `<div style="background-color: #f8d7da; padding: 8px; border-radius: 4px; margin: 8px 0;">
              <p style="margin: 0; color: #721c24;"><b>↺ 再スケッチ推奨:</b> Top5に正解が無い可能性があります。</p>
              <p style="margin: 5px 0 0 0; color: #721c24; font-size: 13px;">${escapeHtml(question || 'もう一度スケッチを描いてください。')}</p>
            </div>`;
          } else if (actionType === 'ask_user' && question) {
            html += `<div style="background-color: #fff3cd; padding: 8px; border-radius: 4px; margin: 8px 0;">
              <p style="margin: 0; color: #856404;"><b>❓ ユーザーへの質問:</b></p>
              <p style="margin: 5px 0 0 0; color: #856404; font-size: 13px;">${escapeHtml(question)}</p>
            </div>`;

            if (remainingCandidates.length > 0) {
              html += `<p style="margin-top: 8px; font-size: 12px; color: #666;"><b>残った候補:</b> ${remainingCandidates.map(id => `#${id}`).join(', ')}</p>`;
            }

            if (questionMode === 'yes_no' && binaryMapping) {
              html += `<div style="margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
                <button type="button" onclick="handleVlmAnswer('yes')">YES</button>
                <button type="button" onclick="handleVlmAnswer('no')">NO</button>
                <button type="button" onclick="handleVlmAnswer('neither')">どちらでもない</button>
                <button type="button" onclick="handleVlmAnswer('resketch')">もう一度スケッチ</button>
              </div>`;
              html += `<p style="margin-top: 6px; font-size: 12px; color: #666;">YES→候補#${binaryMapping.yes_candidate_id} / NO→候補#${binaryMapping.no_candidate_id}</p>`;
            } else {
              // 候補が3つ以上ある場合は yes/no ではなく候補選択式
              const choiceButtons = remainingCandidates.map(id =>
                `<button type="button" onclick="handleVlmAnswer('choose:${id}')">候補#${id}</button>`
              ).join('');
              html += `<div style="margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
                ${choiceButtons}
                <button type="button" onclick="handleVlmAnswer('neither')">どれでもない</button>
                <button type="button" onclick="handleVlmAnswer('resketch')">もう一度スケッチ</button>
              </div>`;
            }

            html += '<div id="vlm-user-answer" style="margin-top:8px; font-size:13px; color:#333;"></div>';
          } else {
            html += `<p style="color: #999;"><i>VLM処理が実行されましたが、決定結果が利用できません。</i></p>`;
          }

          html += '</div>';
          container.innerHTML = html;
        }

        function clearCandidateHighlights() {
          document.querySelectorAll('.sbir-card').forEach(card => {
            card.style.outline = '';
            card.style.boxShadow = '';
          });
        }

        function highlightCandidateCard(rank) {
          const card = document.getElementById(`sbir-card-${rank}`);
          if (!card) return;
          card.style.outline = '3px solid #28a745';
          card.style.boxShadow = '0 0 0 2px rgba(40, 167, 69, 0.2)';
        }

        function publishVlmFeedback(answer, selectedId = null) {
          if (!vlmFeedbackTopic || !lastSbirPayload) return;
          const feedbackPayload = {
            sketch_file: lastSbirPayload.sketch_file || null,
            answer,
            selected_id: selectedId,
            timestamp: Date.now(),
          };
          const msg = new ROSLIB.Message({ data: JSON.stringify(feedbackPayload) });
          vlmFeedbackTopic.publish(msg);
        }

        function handleVlmAnswer(answer) {
          const panel = document.getElementById('vlm-user-answer');
          const decision = (lastSbirPayload && lastSbirPayload.vlm_decision) || null;
          if (!panel || !decision) return;

          const mapping = decision.binary_mapping || {};
          let selected = null;
          let message = '';

          if (answer === 'yes') {
            selected = mapping.yes_candidate_id || null;
            if (selected) {
              highlightCandidateCard(selected);
              message = `YESを選択: 候補#${selected}を採用します。`;
            } else {
              message = 'YESを受け取りました。';
            }
          } else if (answer === 'no') {
            selected = mapping.no_candidate_id || null;
            if (selected) {
              highlightCandidateCard(selected);
              message = `NOを選択: 候補#${selected}を採用します。`;
            } else {
              message = 'NOを受け取りました。';
            }
          } else if (answer.startsWith('choose:')) {
            selected = parseInt(answer.split(':')[1], 10);
            if (!Number.isNaN(selected)) {
              highlightCandidateCard(selected);
              message = `候補#${selected}を選択しました。`;
            } else {
              message = '候補選択を受け取りました。';
            }
          } else if (answer === 'neither') {
            clearCandidateHighlights();
            message = 'どれでもないを選択: Top5に正解が無い可能性があります。再スケッチを推奨します。';
          } else if (answer === 'resketch') {
            clearCandidateHighlights();
            message = '再スケッチを選択: キャンバスをクリアして描き直してください。';
          } else {
            message = '回答を受け取りました。';
          }

          panel.textContent = message;
          publishVlmFeedback(answer, selected);
        }

        function escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

      function callbackAudioBlob(blob) {
          //console.log('callback');
          //console.log(blob);
          convertBlobToDataURL(blob).then( v => {
              console.log('dataurl');
              console.log(v);
              if (ros) {
                  var msg = new ROSLIB.Message({ data: v });
                  rostopic.publish(msg);
              }
          }).catch( er => {
              console.log(er);
          });
      }
    const buttonSend  = document.querySelector('#buttonSend');
    const canvas = document.getElementById('canvas');
    buttonSend.addEventListener('click', event => {
        log('clicked');
        //
        var data = canvas.toDataURL('image/png');
        //console.log(data);
        if (ros) {
            var msg = new ROSLIB.Message({ data: data });
            rostopic.publish(msg);
        }
        // clear drawings
        var context = canvas.getContext('2d');
        //// background style
        //context.fillStyle = "#FFFFFFFF";
        //context.fillRect(0, 0, canvas.width, canvas.height);
        //// background is transparent
        context.clearRect(0, 0, canvas.width, canvas.height);
    });
  </script>
</body>
</html>
